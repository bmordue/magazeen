<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Chat Export - Magazeen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Upload Chat Export</h1>
  <form action="/upload" method="post" enctype="multipart/form-data" id="upload-form">
    <div class="form-group">
      <label for="chatExport">Select your Claude chat export (JSON):</label>
      <p id="chatExportHelper" class="helper-text">You can find this in your Claude account settings under "Export Data". <br><strong>Max file size: 10MB.</strong></p>
      <div id="validation-error" class="error-message" style="display: none; margin-top: 10px; margin-bottom: 10px;" aria-live="polite"></div>
      <input type="file" id="chatExport" name="chatExport" accept=".json" required aria-describedby="chatExportHelper validation-error">
    </div>
    <button type="submit" id="upload-button">Upload and Select Chats</button>
  </form>

  <script>
    const form = document.getElementById('upload-form');
    const uploadButton = document.getElementById('upload-button');
    const fileInput = document.getElementById('chatExport');
    const errorDisplay = document.getElementById('validation-error');

    fileInput.addEventListener('change', () => {
      errorDisplay.style.display = 'none';
      const file = fileInput.files[0];
      if (file) {
        if (!file.name.toLowerCase().endsWith('.json')) {
          errorDisplay.textContent = 'Please select a JSON file.';
          errorDisplay.style.display = 'block';
          fileInput.value = '';
        } else if (file.size > 10 * 1024 * 1024) {
          errorDisplay.textContent = 'File too large. Max size is 10MB.';
          errorDisplay.style.display = 'block';
          fileInput.value = '';
        }
      }
    });

    form.addEventListener('submit', () => {
      uploadButton.disabled = true;
      uploadButton.textContent = 'Uploading...';
    });
  </script>
</body>
</html>
