<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Chat Export - Magazeen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Upload Chat Export</h1>
  <form action="/upload" method="post" enctype="multipart/form-data">
    <div class="form-group">
      <label for="chatExport">Select your Claude chat export (JSON):</label>
      <p class="helper-text">You can find this in your Claude account settings under "Export Data".</p>
      <input type="file" id="chatExport" name="chatExport" accept=".json" required>
    </div>
    <button type="submit">Upload and Select Chats</button>
  </form>
</body>
</html>
