<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Chats - Magazeen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Select Chats to Include</h1>
  <form action="/generate-epub" method="post" id="select-chats-form">
    <input type="hidden" name="sessionId" value="{{sessionId}}">
    <input type="hidden" name="originalFilename" value="{{originalFilename}}">

    <div class="selection-tools">
      <div class="search-container">
        <label for="chat-search" class="visually-hidden">Search chats</label>
        <input type="text" id="chat-search" placeholder="Filter chats by title..." aria-label="Filter chats by title">
      </div>
      <div class="selection-stats">
        <span id="selection-count">0</span> chats selected
      </div>
    </div>

    <div class="select-all-container">
      <input type="checkbox" id="select-all-chats">
      <label for="select-all-chats"><strong>Select All Visible Chats</strong></label>
    </div>
    <hr>

    <div class="chat-list" id="chat-list">
      {{chatList}}
    </div>

    <button type="submit" id="generate-button">Generate EPUB</button>
  </form>

  <script>
    const selectAllCheckbox = document.getElementById('select-all-chats');
    const chatCheckboxes = document.querySelectorAll('input[name="selectedChats"]');
    const form = document.getElementById('select-chats-form');
    const generateButton = document.getElementById('generate-button');
    const searchInput = document.getElementById('chat-search');
    const selectionCountSpan = document.getElementById('selection-count');
    const chatItems = document.querySelectorAll('.chat-item');

    function updateUIState() {
      const allCheckboxes = Array.from(chatCheckboxes);
      const checkedCount = allCheckboxes.filter(cb => cb.checked).length;

      // Update selection counter
      selectionCountSpan.textContent = checkedCount;

      // Get visible checkboxes
      const visibleCheckboxes = allCheckboxes.filter(cb =>
        cb.closest('.chat-item').style.display !== 'none'
      );
      const visibleCheckedCount = visibleCheckboxes.filter(cb => cb.checked).length;
      const totalVisibleCount = visibleCheckboxes.length;

      // Update Select All state based on VISIBLE chats
      if (totalVisibleCount === 0) {
        selectAllCheckbox.checked = false;
        selectAllCheckbox.indeterminate = false;
        selectAllCheckbox.disabled = true;
      } else {
        selectAllCheckbox.disabled = false;
        selectAllCheckbox.checked = visibleCheckedCount === totalVisibleCount;
        selectAllCheckbox.indeterminate = visibleCheckedCount > 0 && visibleCheckedCount < totalVisibleCount;
      }

      // Update Generate Button state - disable if nothing is selected (globally)
      generateButton.disabled = checkedCount === 0;
      if (checkedCount === 0) {
        generateButton.title = "Select at least one chat to generate EPUB";
      } else {
        generateButton.title = "";
      }
    }

    selectAllCheckbox.addEventListener('change', (e) => {
      const isChecked = e.target.checked;
      chatCheckboxes.forEach(cb => {
        const item = cb.closest('.chat-item');
        if (item.style.display !== 'none') {
          cb.checked = isChecked;
        }
      });
      updateUIState();
    });

    chatCheckboxes.forEach(cb => {
      cb.addEventListener('change', updateUIState);
    });

    searchInput.addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase();
      chatItems.forEach(item => {
        const title = item.querySelector('label').textContent.toLowerCase();
        if (title.includes(searchTerm)) {
          item.style.display = '';
        } else {
          item.style.display = 'none';
        }
      });
      updateUIState();
    });

    form.addEventListener('submit', (e) => {
      const checkedCount = Array.from(chatCheckboxes).filter(cb => cb.checked).length;
      if (checkedCount === 0) {
        e.preventDefault();
        return;
      }
      generateButton.disabled = true;
      generateButton.textContent = 'Generating...';
    });

    // Initialize state on page load
    updateUIState();
  </script>
</body>
</html>
