<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Chats - Magazeen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Select Chats: {{originalFilename}}</h1>
  <form action="/generate-epub" method="post" id="select-chats-form">
    <input type="hidden" name="sessionId" value="{{sessionId}}">
    <input type="hidden" name="originalFilename" value="{{originalFilename}}">

    <div class="sticky-header">
      <div class="form-group">
        <label for="chat-search">Search chats <small>(Press '/' to focus)</small>:</label>
        <div class="search-container">
          <input type="text" id="chat-search" class="search-input" placeholder="Filter by title..." autocomplete="off">
          <button type="button" id="search-clear" class="search-clear" aria-label="Clear search">&times;</button>
        </div>
        <div style="margin-top: 8px;">
          <label for="show-selected-only" style="font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="show-selected-only">
            Show selected only
          </label>
        </div>
      </div>

      <label class="select-all-container" for="select-all-chats">
        <input type="checkbox" id="select-all-chats">
        <span id="select-all-label"><strong>Select All Chats</strong></span>
        <span id="selection-count" class="selection-counter" aria-live="polite"></span>
      </label>
    </div>

    <div class="chat-list" id="chat-list">
      {{chatList}}
    </div>
    <div id="no-results" class="no-results">
      No chats found matching your filters.
      <br>
      <button type="button" class="link-button" onclick="clearSearch()">Clear search</button>
    </div>

    <div class="sticky-footer">
      <div class="footer-hint">
        Tip: Press <strong>Ctrl + Enter</strong> (or <strong>Cmd + Enter</strong>) to generate
      </div>
      <button type="submit" id="generate-button">Generate EPUB</button>
    </div>
  </form>

  <script>
    const pluralize = (count, s, p) => count === 1 ? s : p;

    const selectAllCheckbox = document.getElementById('select-all-chats');
    const selectAllLabel = document.getElementById('select-all-label');
    const chatCheckboxes = document.querySelectorAll('input[name="selectedChats"]');
    const chatItems = document.querySelectorAll('.chat-item');
    const chatSearch = document.getElementById('chat-search');
    const showSelectedOnly = document.getElementById('show-selected-only');
    const searchClear = document.getElementById('search-clear');
    const noResults = document.getElementById('no-results');
    const selectionCounter = document.getElementById('selection-count');
    const form = document.getElementById('select-chats-form');
    const generateButton = document.getElementById('generate-button');

    let lastChecked = null;

    function updateUIState() {
      let totalMessages = 0;
      const checkedCount = Array.from(chatCheckboxes).filter(cb => {
        const isChecked = cb.checked;
        const label = cb.closest('.chat-item-label');
        if (label) {
          label.classList.toggle('selected', isChecked);
        }
        if (isChecked) {
          totalMessages += Number(cb.dataset.messageCount || 0);
        }
        return isChecked;
      }).length;
      const totalCount = chatCheckboxes.length;

      // Filter visible checkboxes for "Select All" logic
      const visibleCheckboxes = Array.from(chatCheckboxes).filter(cb => cb.closest('.chat-item').style.display !== 'none');
      const visibleCheckedCount = visibleCheckboxes.filter(cb => cb.checked).length;
      const visibleTotalCount = visibleCheckboxes.length;

      // Update counter text
      const selectedText = `Selected: ${checkedCount} ${pluralize(checkedCount, 'chat', 'chats')} (${totalMessages} ${pluralize(totalMessages, 'message', 'messages')})`;
      if (visibleTotalCount < totalCount) {
        selectionCounter.textContent = `Showing ${visibleTotalCount} of ${totalCount} | ${selectedText}`;
        selectAllLabel.innerHTML = '<strong>Select All Visible</strong>';
      } else {
        selectionCounter.textContent = selectedText;
        selectAllLabel.innerHTML = '<strong>Select All Chats</strong>';
      }

      // Update Select All state based on visible items
      selectAllCheckbox.checked = visibleCheckedCount === visibleTotalCount && visibleTotalCount > 0;
      selectAllCheckbox.indeterminate = visibleCheckedCount > 0 && visibleCheckedCount < visibleTotalCount;

      // Update Generate Button state - disable if nothing is selected
      generateButton.disabled = checkedCount === 0;
      if (checkedCount === 0) {
        generateButton.title = "Select at least one chat to generate EPUB";
        generateButton.textContent = 'Generate EPUB';
      } else {
        generateButton.title = "";
        generateButton.textContent = `Generate EPUB (${checkedCount})`;
      }

      // Update Search Clear button visibility
      searchClear.style.display = chatSearch.value ? 'block' : 'none';
    }

    selectAllCheckbox.addEventListener('change', (e) => {
      // Only affect visible checkboxes
      chatCheckboxes.forEach(cb => {
        if (cb.closest('.chat-item').style.display !== 'none') {
          cb.checked = e.target.checked;
        }
      });
      applyFilters();
    });

    chatCheckboxes.forEach(cb => {
      cb.addEventListener('click', (e) => {
        if (e.shiftKey && lastChecked && lastChecked !== cb) {
          let inRange = false;
          let shouldCheck = lastChecked.checked;

          chatCheckboxes.forEach(checkbox => {
            if (checkbox === cb || checkbox === lastChecked) {
              inRange = !inRange;
            }

            if (inRange || checkbox === cb || checkbox === lastChecked) {
              // Only affect visible checkboxes in range
              if (checkbox.closest('.chat-item').style.display !== 'none') {
                checkbox.checked = shouldCheck;
              }
            }
          });
        }
        lastChecked = cb;
        applyFilters();
      });

      cb.addEventListener('change', applyFilters);
    });

    function applyFilters() {
      const searchTerm = chatSearch.value.toLowerCase();
      const onlySelected = showSelectedOnly.checked;
      let visibleCount = 0;

      chatItems.forEach(item => {
        const titleElement = item.querySelector('.chat-item-title');
        const title = titleElement.textContent.toLowerCase();
        const isChecked = item.querySelector('input[name="selectedChats"]').checked;

        const matchesSearch = title.includes(searchTerm);
        const matchesSelection = !onlySelected || isChecked;

        const isVisible = matchesSearch && matchesSelection;
        item.style.display = isVisible ? '' : 'none';
        if (isVisible) visibleCount++;
      });

      noResults.style.display = visibleCount === 0 ? 'block' : 'none';
      searchClear.style.display = chatSearch.value ? 'block' : 'none';
      updateUIState();
    }

    function clearSearch() {
      chatSearch.value = '';
      showSelectedOnly.checked = false;
      applyFilters();
      chatSearch.focus();
    }

    chatSearch.addEventListener('input', applyFilters);
    showSelectedOnly.addEventListener('change', applyFilters);


    searchClear.addEventListener('click', clearSearch);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Clear filters with 'Escape'
      if (e.key === 'Escape') {
        clearSearch();
        chatSearch.blur();
      }

      // Focus search with '/'
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        chatSearch.focus();
      }

      // Generate EPUB with Ctrl/Cmd + Enter
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        const checkedCount = Array.from(chatCheckboxes).filter(cb => cb.checked).length;
        if (checkedCount > 0 && !generateButton.disabled) {
          if (typeof form.requestSubmit === 'function') {
            form.requestSubmit();
          } else {
            generateButton.click();
          }
        }
      }
    });

    form.addEventListener('submit', (e) => {
      const checkedCount = Array.from(chatCheckboxes).filter(cb => cb.checked).length;
      if (checkedCount === 0) {
        e.preventDefault();
        return;
      }
      generateButton.disabled = true;
      generateButton.textContent = 'Generating...';
    });

    // Initialize state on page load
    chatSearch.focus();
    applyFilters();
  </script>
</body>
</html>
