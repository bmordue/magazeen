name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests and generate coverage
        id: run-tests
        continue-on-error: true
        run: |
          mkdir -p test-results
          mkdir -p out
          npm test -- --coverage 2>&1 | tee test-results/test-output.txt
          exit_code=${PIPESTATUS[0]}
          echo "test_exit_code=$exit_code" >> $GITHUB_OUTPUT
          if [ -f junit.xml ]; then mv junit.xml test-results/ || true; fi

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

      - name: Lint
        run: npm run lint

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage/lcov-report/index.html
          message: |
            ## Code Coverage Report
            Coverage report generated. See workflow artifacts for the full report.

      - name: Fail job on test failures
        if: steps.run-tests.outputs.test_exit_code != '0'
        run: |
          echo "Tests failed (exit code: ${{ steps.run-tests.outputs.test_exit_code }}). Failing job after uploading artifacts."
          exit 1
